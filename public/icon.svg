<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Dark Rounded Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="#0f172a" stroke="url(#grad1)" stroke-width="8" />
  
  <!-- Outer glowing circle -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#grad2)" stroke-width="4" stroke-dasharray="10, 10" />

  <!-- Shield and Phone Graphic Combined -->
  <g transform="translate(156, 136)">
    <!-- Device Frame -->
    <rect x="20" y="0" width="160" height="240" rx="20" fill="none" stroke="url(#grad1)" stroke-width="12" filter="url(#glow)" />
    
    <!-- Camera/Notch -->
    <rect x="75" y="8" width="50" height="12" rx="6" fill="#6366f1" />
    
    <!-- Checkmark inside device (Pass indicator) -->
    <path d="M 50 110 L 85 145 L 150 70" fill="none" stroke="url(#grad2)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  
  <!-- Decorative small circles -->
  <circle cx="120" cy="120" r="16" fill="#6366f1" />
  <circle cx="392" cy="392" r="12" fill="#14b8a6" />
  <circle cx="392" cy="120" r="8" fill="#a855f7" />
  <circle cx="120" cy="392" r="10" fill="#3b82f6" />
</svg>
